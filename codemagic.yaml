workflows:
  android-build:
    name: Android Debug Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    triggering:
      events:
        - push
    scripts:
      - name: Set execute permission for gradlew
        script: |
          chmod +x gradlew
      - name: Build Android APK
        script: |
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/**/*.apk
